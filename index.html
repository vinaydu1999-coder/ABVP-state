<style>
/* ═══════════════════════════════════════════════════════════════════
   DESIGN SYSTEM — Deep navy / warm gold / cream
═══════════════════════════════════════════════════════════════════ */
:root {
  --navy:       #1a2744;
  --navy-deep:  #0f1a30;
  --navy-mid:   #243152;
  --navy-light: #2e3f6a;
  --gold:       #c9a84c;
  --gold-light: #e0c272;
  --gold-pale:  #f5e9c4;
  --cream:      #faf8f3;
  --cream-mid:  #f0ece0;
  --white:      #ffffff;
  --text-main:  #1a2744;
  --text-mid:   #4a5568;
  --text-soft:  #718096;
  --success:    #2d7a4f;
  --warning:    #b45309;
  --danger:     #9b1c1c;
  --info:       #1e5799;
  --border:     #ddd8cc;
  --shadow-sm:  0 1px 3px rgba(26,39,68,.08);
  --shadow-md:  0 4px 16px rgba(26,39,68,.12);
  --shadow-lg:  0 8px 32px rgba(26,39,68,.16);
  --radius-sm:  4px;
  --radius-md:  8px;
  --radius-lg:  12px;
  --sidebar-w:  260px;
  --header-h:   60px;
  --font-serif: 'Cormorant Garamond', Georgia, serif;
  --font-sans:  'DM Sans', sans-serif;
  --font-mono:  'DM Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 15px; scroll-behavior: smooth; }

body {
  font-family: var(--font-sans);
  background: var(--cream);
  color: var(--text-main);
  min-height: 100vh;
  display: flex;
  overflow-x: hidden;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

/* ═══════════════════════════════════════
   AUTH SCREEN
═══════════════════════════════════════ */
#auth-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: linear-gradient(135deg, var(--navy-deep) 0%, var(--navy) 60%, #243d6a 100%);
  display: flex; align-items: center; justify-content: center;
}

.auth-panel {
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(201,168,76,.25);
  border-radius: var(--radius-lg);
  padding: 48px 40px;
  width: min(420px, 94vw);
  backdrop-filter: blur(16px);
}

.auth-logo {
  text-align: center;
  margin-bottom: 32px;
}

.auth-logo-mark {
  width: 56px; height: 56px;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  border-radius: 14px;
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--font-serif);
  font-size: 26px; font-weight: 700;
  color: var(--navy-deep);
  margin-bottom: 12px;
}

.auth-logo h1 {
  font-family: var(--font-serif);
  font-size: 1.8rem;
  font-weight: 600;
  color: var(--white);
  letter-spacing: .04em;
}

.auth-logo p {
  font-size: .8rem;
  color: rgba(255,255,255,.5);
  letter-spacing: .12em;
  text-transform: uppercase;
  margin-top: 4px;
}

.auth-tabs {
  display: flex;
  background: rgba(255,255,255,.05);
  border-radius: var(--radius-md);
  padding: 4px;
  margin-bottom: 28px;
  gap: 4px;
}

.auth-tab {
  flex: 1; padding: 8px;
  border: none; border-radius: 6px;
  background: transparent; color: rgba(255,255,255,.5);
  font-family: var(--font-sans); font-size: .85rem;
  cursor: pointer; transition: all .2s;
}
.auth-tab.active {
  background: var(--gold); color: var(--navy-deep);
  font-weight: 600;
}

.auth-field { margin-bottom: 16px; }
.auth-field label { display: block; font-size: .78rem; color: rgba(255,255,255,.6); margin-bottom: 6px; letter-spacing: .06em; text-transform: uppercase; }
.auth-field input, .auth-field select {
  width: 100%; padding: 11px 14px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: var(--radius-sm);
  color: var(--white); font-family: var(--font-sans); font-size: .9rem;
  outline: none; transition: border .2s;
}
.auth-field input:focus, .auth-field select:focus { border-color: var(--gold); }
.auth-field input::placeholder { color: rgba(255,255,255,.3); }
.auth-field select option { background: var(--navy-deep); }

.btn-auth {
  width: 100%; padding: 13px;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  border: none; border-radius: var(--radius-sm);
  color: var(--navy-deep); font-family: var(--font-sans);
  font-size: .95rem; font-weight: 700; cursor: pointer;
  letter-spacing: .04em; transition: opacity .2s;
  margin-top: 8px;
}
.btn-auth:hover { opacity: .9; }
.auth-error { color: #fc8181; font-size: .82rem; margin-top: 10px; text-align: center; }

/* ═══════════════════════════════════════
   APP SHELL
═══════════════════════════════════════ */
#app { display: none; flex: 1; width: 100%; }
#app.visible { display: flex; }

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--navy-deep);
  min-height: 100vh;
  display: flex; flex-direction: column;
  position: fixed; left: 0; top: 0; bottom: 0; z-index: 200;
  transform: translateX(-100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  border-right: 1px solid rgba(201,168,76,.1);
}
.sidebar.open { transform: translateX(0); }

.sidebar-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid rgba(255,255,255,.06);
}

.sidebar-brand {
  display: flex; align-items: center; gap: 10px;
}

.sidebar-logo {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-serif); font-size: 16px; font-weight: 700;
  color: var(--navy-deep); flex-shrink: 0;
}

.sidebar-brand-text strong {
  display: block; font-family: var(--font-serif);
  font-size: 1.1rem; color: var(--white); font-weight: 600;
}
.sidebar-brand-text span { font-size: .7rem; color: rgba(255,255,255,.4); letter-spacing: .08em; }

.sidebar-user {
  margin: 12px 20px;
  padding: 10px 12px;
  background: rgba(255,255,255,.04);
  border-radius: var(--radius-sm);
  border: 1px solid rgba(201,168,76,.12);
}

.sidebar-user-name { font-size: .82rem; color: var(--gold-light); font-weight: 500; }
.sidebar-user-role { font-size: .7rem; color: rgba(255,255,255,.4); margin-top: 2px; letter-spacing: .06em; text-transform: uppercase; }

.sidebar-nav { flex: 1; padding: 8px 0; overflow-y: auto; }

.nav-section-title {
  font-size: .65rem; letter-spacing: .14em; text-transform: uppercase;
  color: rgba(255,255,255,.25); padding: 12px 20px 6px;
}

.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 20px; cursor: pointer;
  color: rgba(255,255,255,.6); font-size: .88rem;
  transition: all .2s; border-left: 3px solid transparent;
  text-decoration: none;
}
.nav-item:hover { color: var(--white); background: rgba(255,255,255,.04); }
.nav-item.active { color: var(--gold-light); background: rgba(201,168,76,.08); border-left-color: var(--gold); }
.nav-item .nav-icon { width: 16px; text-align: center; font-size: .9rem; flex-shrink: 0; }
.nav-badge {
  margin-left: auto;
  background: var(--gold); color: var(--navy-deep);
  font-size: .65rem; font-weight: 700;
  padding: 2px 7px; border-radius: 10px;
}

.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid rgba(255,255,255,.06);
}

.btn-logout {
  width: 100%; padding: 9px;
  background: rgba(155,28,28,.15); border: 1px solid rgba(155,28,28,.3);
  border-radius: var(--radius-sm); color: #fc8181;
  font-family: var(--font-sans); font-size: .82rem; cursor: pointer;
  transition: all .2s; letter-spacing: .04em;
}
.btn-logout:hover { background: rgba(155,28,28,.25); }

/* ── Overlay ── */
.sidebar-overlay {
  display: none; position: fixed; inset: 0; z-index: 150;
  background: rgba(0,0,0,.5); backdrop-filter: blur(2px);
}
.sidebar-overlay.show { display: block; }

/* ── Main Content ── */
.main-wrap {
  flex: 1; display: flex; flex-direction: column;
  margin-left: 0; min-height: 100vh;
  transition: margin .3s;
}

.topbar {
  height: var(--header-h);
  background: var(--white);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 20px; gap: 12px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: var(--shadow-sm);
}

.topbar-menu-btn {
  width: 36px; height: 36px;
  background: none; border: 1px solid var(--border);
  border-radius: var(--radius-sm); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-mid); font-size: 1rem; flex-shrink: 0;
}

.topbar-title {
  font-family: var(--font-serif); font-size: 1.25rem;
  font-weight: 600; color: var(--navy); flex: 1;
}

.topbar-actions { display: flex; align-items: center; gap: 8px; }

.topbar-notif {
  position: relative; width: 36px; height: 36px;
  background: none; border: 1px solid var(--border);
  border-radius: var(--radius-sm); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-mid); font-size: .9rem;
}
.notif-dot {
  position: absolute; top: 6px; right: 6px;
  width: 7px; height: 7px; background: var(--gold);
  border-radius: 50%;
}

.page-content {
  flex: 1; padding: 24px 20px;
  max-width: 1400px; width: 100%; margin: 0 auto;
}

/* ═══════════════════════════════════════
   COMMON COMPONENTS
═══════════════════════════════════════ */
.page-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 24px; gap: 12px; flex-wrap: wrap;
}

.page-header-left h2 {
  font-family: var(--font-serif); font-size: 1.8rem;
  font-weight: 600; color: var(--navy);
}

.page-header-left p { color: var(--text-soft); font-size: .88rem; margin-top: 3px; }

.breadcrumb {
  display: flex; align-items: center; gap: 6px;
  font-size: .78rem; color: var(--text-soft); margin-bottom: 6px;
}
.breadcrumb span { color: var(--text-soft); }
.breadcrumb .sep { color: var(--border); }
.breadcrumb .current { color: var(--gold); }

/* Cards */
.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}

.card-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}

.card-header h3 {
  font-family: var(--font-serif); font-size: 1.1rem; font-weight: 600;
  color: var(--navy);
}

.card-body { padding: 20px; }

/* Stats Grid */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  position: relative; overflow: hidden;
}

.stat-card::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
}
.stat-card.navy::before { background: var(--navy); }
.stat-card.gold::before { background: var(--gold); }
.stat-card.green::before { background: var(--success); }
.stat-card.warn::before { background: var(--warning); }

.stat-card-icon {
  width: 36px; height: 36px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: .9rem; margin-bottom: 12px;
}
.stat-card.navy .stat-card-icon { background: rgba(26,39,68,.08); color: var(--navy); }
.stat-card.gold .stat-card-icon { background: rgba(201,168,76,.12); color: var(--gold); }
.stat-card.green .stat-card-icon { background: rgba(45,122,79,.1); color: var(--success); }
.stat-card.warn .stat-card-icon { background: rgba(180,83,9,.1); color: var(--warning); }

.stat-value {
  font-family: var(--font-serif); font-size: 2rem;
  font-weight: 700; color: var(--navy); line-height: 1;
}

.stat-label { font-size: .78rem; color: var(--text-soft); margin-top: 4px; text-transform: uppercase; letter-spacing: .06em; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 7px; padding: 9px 18px;
  border-radius: var(--radius-sm); font-family: var(--font-sans);
  font-size: .85rem; font-weight: 500; cursor: pointer;
  border: none; transition: all .2s; text-decoration: none;
  white-space: nowrap;
}
.btn-primary { background: var(--navy); color: var(--white); }
.btn-primary:hover { background: var(--navy-light); }
.btn-gold { background: var(--gold); color: var(--navy-deep); font-weight: 600; }
.btn-gold:hover { background: var(--gold-light); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-mid); }
.btn-outline:hover { border-color: var(--navy); color: var(--navy); }
.btn-danger { background: transparent; border: 1px solid rgba(155,28,28,.3); color: var(--danger); }
.btn-danger:hover { background: rgba(155,28,28,.06); }
.btn-success { background: var(--success); color: var(--white); }
.btn-sm { padding: 6px 12px; font-size: .78rem; }
.btn-xs { padding: 4px 9px; font-size: .72rem; }

/* Tables */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead th {
  padding: 10px 14px; text-align: left;
  font-size: .72rem; letter-spacing: .08em; text-transform: uppercase;
  color: var(--text-soft); font-weight: 500;
  border-bottom: 2px solid var(--border);
  background: var(--cream);
  white-space: nowrap;
}
tbody td { padding: 12px 14px; border-bottom: 1px solid var(--cream-mid); font-size: .87rem; }
tbody tr:hover { background: var(--cream); }
tbody tr:last-child td { border-bottom: none; }

/* Forms */
.form-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
.form-grid-2 { grid-template-columns: 1fr 1fr; }
@media (max-width: 600px) { .form-grid-2 { grid-template-columns: 1fr; } }

.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label { font-size: .78rem; color: var(--text-mid); font-weight: 500; letter-spacing: .04em; }

.form-control {
  padding: 10px 12px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-family: var(--font-sans); font-size: .88rem;
  color: var(--text-main); background: var(--white);
  outline: none; transition: border .2s; width: 100%;
}
.form-control:focus { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(26,39,68,.06); }
.form-control::placeholder { color: var(--text-soft); }
select.form-control { cursor: pointer; }
textarea.form-control { resize: vertical; min-height: 80px; }

/* Badges */
.badge {
  display: inline-flex; align-items: center;
  padding: 3px 9px; border-radius: 20px;
  font-size: .7rem; font-weight: 600; letter-spacing: .04em;
}
.badge-pending { background: rgba(180,83,9,.1); color: var(--warning); }
.badge-approved { background: rgba(45,122,79,.1); color: var(--success); }
.badge-rejected { background: rgba(155,28,28,.1); color: var(--danger); }
.badge-gold { background: rgba(201,168,76,.12); color: #8a6914; }
.badge-navy { background: rgba(26,39,68,.08); color: var(--navy); }

/* Tabs */
.tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 20px; overflow-x: auto; }
.tab-btn {
  padding: 10px 18px; font-size: .85rem; font-weight: 500;
  color: var(--text-soft); background: none; border: none;
  cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent;
  margin-bottom: -2px; transition: all .2s;
}
.tab-btn.active { color: var(--navy); border-bottom-color: var(--navy); font-weight: 600; }
.tab-btn:hover:not(.active) { color: var(--text-mid); }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(15,26,48,.6); backdrop-filter: blur(4px);
  align-items: center; justify-content: center; padding: 16px;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--white); border-radius: var(--radius-lg);
  width: min(560px, 100%); max-height: 90vh;
  display: flex; flex-direction: column;
  box-shadow: var(--shadow-lg);
  animation: modalIn .25s ease;
}
@keyframes modalIn { from { opacity:0; transform:scale(.96) translateY(8px); } to { opacity:1; transform:none; } }
.modal-lg { width: min(800px, 100%); }
.modal-xl { width: min(1000px, 100%); }
.modal-header {
  padding: 18px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.modal-header h3 { font-family: var(--font-serif); font-size: 1.15rem; font-weight: 600; color: var(--navy); }
.modal-close {
  width: 30px; height: 30px; border-radius: var(--radius-sm);
  background: var(--cream); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-soft); font-size: 1rem;
}
.modal-close:hover { background: var(--cream-mid); color: var(--text-main); }
.modal-body { padding: 20px; overflow-y: auto; flex: 1; }
.modal-footer {
  padding: 14px 20px; border-top: 1px solid var(--border);
  display: flex; justify-content: flex-end; gap: 10px; flex-shrink: 0;
}

/* Search bar */
.search-bar {
  display: flex; align-items: center;
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius-sm); overflow: hidden;
  flex: 1; max-width: 360px;
}
.search-bar input {
  flex: 1; padding: 9px 12px; border: none; outline: none;
  font-family: var(--font-sans); font-size: .87rem; color: var(--text-main);
  background: transparent;
}
.search-bar button {
  padding: 9px 12px; background: none; border: none;
  color: var(--text-soft); cursor: pointer; font-size: .85rem;
}

/* Filter bar */
.filter-bar {
  display: flex; align-items: center; gap: 10px;
  flex-wrap: wrap; margin-bottom: 16px;
}

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 48px 20px;
  color: var(--text-soft);
}
.empty-state-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: .4; }
.empty-state h4 { font-family: var(--font-serif); font-size: 1.1rem; color: var(--text-mid); margin-bottom: 6px; }
.empty-state p { font-size: .85rem; }

/* ── Toast ── */
#toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast {
  padding: 12px 18px; border-radius: var(--radius-sm);
  font-size: .85rem; font-weight: 500;
  background: var(--navy-deep); color: var(--white);
  box-shadow: var(--shadow-md);
  border-left: 3px solid var(--gold);
  animation: toastIn .3s ease;
  max-width: 320px;
}
.toast.success { border-left-color: var(--success); }
.toast.error { border-left-color: var(--danger); }
@keyframes toastIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:none; } }

/* ── Spinner ── */
.spinner {
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,.2);
  border-top-color: currentColor;
  animation: spin .7s linear infinite; display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Avatar ── */
.avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--navy), var(--navy-light));
  color: var(--gold-light); font-family: var(--font-serif);
  font-size: .85rem; font-weight: 600;
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.avatar-lg { width: 52px; height: 52px; font-size: 1.2rem; }

/* ═══════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════ */
.dashboard-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 20px;
}
.col-4 { grid-column: span 4; }
.col-6 { grid-column: span 6; }
.col-8 { grid-column: span 8; }
.col-12 { grid-column: span 12; }
@media (max-width: 900px) {
  .col-4, .col-6, .col-8 { grid-column: span 12; }
}
@media (min-width: 901px) and (max-width: 1100px) {
  .col-4 { grid-column: span 6; }
}

.heatmap-grid {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px;
}
.heatmap-cell {
  aspect-ratio: 1; border-radius: 2px;
  background: var(--cream-mid); transition: background .2s;
}
.heatmap-cell.l1 { background: rgba(26,39,68,.15); }
.heatmap-cell.l2 { background: rgba(26,39,68,.35); }
.heatmap-cell.l3 { background: rgba(26,39,68,.6); }
.heatmap-cell.l4 { background: var(--navy); }

/* ═══════════════════════════════════════
   UNIT TREE
═══════════════════════════════════════ */
.unit-tree { display: flex; flex-direction: column; gap: 4px; }
.unit-node {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--white);
  cursor: pointer; transition: all .2s;
}
.unit-node:hover { border-color: var(--navy); box-shadow: var(--shadow-sm); }
.unit-node .unit-icon {
  width: 30px; height: 30px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: .8rem; flex-shrink: 0;
}
.unit-node.level-state .unit-icon { background: rgba(26,39,68,.1); color: var(--navy); }
.unit-node.level-university .unit-icon { background: rgba(201,168,76,.12); color: var(--gold); }
.unit-node.level-college .unit-icon { background: rgba(45,122,79,.1); color: var(--success); }
.unit-node.level-faculty .unit-icon { background: rgba(30,87,153,.1); color: var(--info); }

.unit-name { font-weight: 500; font-size: .88rem; flex: 1; }
.unit-meta { font-size: .75rem; color: var(--text-soft); }

.unit-children { margin-left: 20px; padding-left: 12px; border-left: 1px dashed var(--border); margin-top: 4px; display: flex; flex-direction: column; gap: 4px; }

/* ═══════════════════════════════════════
   ID CARD
═══════════════════════════════════════ */
.id-card {
  width: 340px; border-radius: 14px; overflow: hidden;
  box-shadow: var(--shadow-lg);
  background: var(--white);
  font-family: var(--font-sans);
  user-select: none;
}
.id-card-header {
  background: linear-gradient(135deg, var(--navy-deep), var(--navy));
  padding: 20px; text-align: center;
  border-bottom: 3px solid var(--gold);
}
.id-card-header .org-name {
  font-family: var(--font-serif); font-size: 1rem; color: var(--gold-light);
  letter-spacing: .06em;
}
.id-card-header .id-title {
  font-size: .68rem; color: rgba(255,255,255,.5);
  text-transform: uppercase; letter-spacing: .12em; margin-top: 3px;
}
.id-card-body { padding: 16px; }
.id-photo {
  width: 72px; height: 72px; border-radius: 50%;
  background: linear-gradient(135deg, var(--navy), var(--navy-light));
  border: 3px solid var(--gold);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-serif); font-size: 1.8rem; color: var(--gold-light);
  margin: 0 auto 12px;
}
.id-member-name {
  text-align: center; font-family: var(--font-serif);
  font-size: 1.2rem; color: var(--navy); font-weight: 600;
}
.id-member-role { text-align: center; font-size: .75rem; color: var(--text-soft); margin-top: 2px; }
.id-details {
  margin-top: 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}
.id-field label { font-size: .62rem; text-transform: uppercase; letter-spacing: .08em; color: var(--text-soft); display: block; }
.id-field span { font-size: .8rem; color: var(--navy); font-weight: 500; }
.id-card-footer {
  background: var(--cream); padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
  border-top: 1px solid var(--border);
}
.id-number { font-family: var(--font-mono); font-size: .75rem; color: var(--navy); font-weight: 500; }
.id-qr { width: 52px; height: 52px; }

/* ═══════════════════════════════════════
   FINANCE
═══════════════════════════════════════ */
.fund-card {
  border: 1px solid var(--border); border-radius: var(--radius-lg);
  background: var(--white); overflow: hidden;
}
.fund-card-header {
  padding: 14px 18px;
  display: flex; align-items: center; justify-content: space-between;
}
.fund-card-header.general { background: linear-gradient(135deg, var(--navy-deep), var(--navy)); color: var(--white); }
.fund-card-header.objective { background: linear-gradient(135deg, #1a4a2e, #2d7a4f); color: var(--white); }
.fund-balance { font-family: var(--font-serif); font-size: 1.6rem; font-weight: 700; }
.fund-balance small { font-size: .7rem; opacity: .7; margin-right: 4px; }

.ledger-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; border-bottom: 1px solid var(--cream-mid);
  font-size: .85rem;
}
.ledger-row:last-child { border-bottom: none; }
.ledger-type {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.ledger-type.credit { background: var(--success); }
.ledger-type.debit { background: var(--danger); }
.ledger-type.transfer { background: var(--gold); }
.ledger-amount { margin-left: auto; font-family: var(--font-mono); font-weight: 500; }
.ledger-amount.credit { color: var(--success); }
.ledger-amount.debit { color: var(--danger); }

/* ═══════════════════════════════════════
   NOTIFICATIONS
═══════════════════════════════════════ */
.notif-card {
  display: flex; gap: 12px; padding: 14px 16px;
  border-bottom: 1px solid var(--cream-mid); align-items: flex-start;
}
.notif-card:last-child { border-bottom: none; }
.notif-dot-type {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0; margin-top: 5px;
}
.notif-dot-type.broadcast { background: var(--gold); }
.notif-dot-type.system { background: var(--info); }
.notif-dot-type.alert { background: var(--danger); }
.notif-content h4 { font-size: .88rem; font-weight: 600; color: var(--navy); }
.notif-content p { font-size: .8rem; color: var(--text-soft); margin-top: 3px; }
.notif-meta { margin-left: auto; font-size: .72rem; color: var(--text-soft); white-space: nowrap; }

/* ═══════════════════════════════════════
   EVENTS
═══════════════════════════════════════ */
.event-card {
  border: 1px solid var(--border); border-radius: var(--radius-lg);
  background: var(--white); overflow: hidden;
  transition: box-shadow .2s;
}
.event-card:hover { box-shadow: var(--shadow-md); }
.event-card-banner {
  height: 8px;
  background: linear-gradient(90deg, var(--navy), var(--navy-light));
}
.event-card-body { padding: 16px; }
.event-card-title { font-family: var(--font-serif); font-size: 1.05rem; font-weight: 600; color: var(--navy); }
.event-card-meta { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; font-size: .78rem; color: var(--text-soft); }
.event-card-meta span { display: flex; align-items: center; gap: 4px; }
.event-card-footer {
  padding: 10px 16px; border-top: 1px solid var(--cream-mid);
  display: flex; justify-content: space-between; align-items: center;
}

/* ═══════════════════════════════════════
   PRINT STYLES
═══════════════════════════════════════ */
@media print {
  .sidebar, .topbar, .page-header .btn, .no-print { display: none !important; }
  .main-wrap { margin: 0 !important; }
  .card { box-shadow: none !important; }
  body { background: white; }
}

  .main-wrap { margin-left: var(--sidebar-w); }
  .topbar-menu-btn { display: none; }
}

  .page-content { padding: 16px 12px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .modal { max-height: 95vh; }
}

.invitation-card .inv-details { border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 16px 0; margin: 16px 0; }
.invitation-card .inv-detail-row { display: flex; justify-content: center; gap: 8px; font-size: .9rem; color: var(--text-mid); margin: 5px 0; }

</style>
</head>
<body>

<!-- Toast -->
<div id="toast-container"></div>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-panel">
    <div class="auth-logo">
      <div class="auth-logo-mark">O</div>
      <h1>OrgNet</h1>
      <p>State Organisation Management</p>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Sign In</button>

    </div>

<!-- APP -->
<div id="app">
  <!-- Sidebar Overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="sidebar-logo">O</div>

      </a>

        <span class="nav-icon">◷</span> Events

    </div>

  <!-- Main -->
  <div class="main-wrap">

        <button class="topbar-notif" onclick="navigate('notifications')">
          🔔<span class="notif-dot" id="notif-dot"></span>

    </main>

<!-- ════════════════════════════════════════════════════════════
     JAVASCRIPT — All modules
════════════════════════════════════════════════════════════ -->
<script>
// ═══════════════════════════════════════
// STATE & HELPERS
// ═══════════════════════════════════════
const state = {
  user: null,
  userProfile: null,
  currentPage: 'dashboard',
  unsubscribers: [],
  cache: {
    members: [],
    units: [],
    transactions: [],
    events: [],
    notifications: [],
    objectives: []
  }
};

function toast(msg, type='info', duration=3500) {
  const c = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), duration);
}

function modal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

function fmt(n) { return (n||0).toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtDate(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'});
}
function initials(name) { return (name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function genId(prefix) { return prefix + '-' + Date.now().toString(36).toUpperCase() + Math.random().toString(36).substr(2,4).toUpperCase(); }

function confirm_dialog(msg) { return window.confirm(msg); }

// ═══════════════════════════════════════
// AUTH MODULE
// ═══════════════════════════════════════
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((b,i) => b.classList.toggle('active', (tab==='login')===!i));
  document.getElementById('auth-login').classList.toggle('hidden', tab!=='login');
  document.getElementById('auth-register').classList.toggle('hidden', tab==='login');
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-password').value;
  if (!email||!pass) { showAuthErr('Please fill all fields'); return; }
  try {
    const { signInWithEmailAndPassword } = window._fb;
    await signInWithEmailAndPassword(window._fb.auth, email, pass);
  } catch(e) {
    if (e.code==='auth/user-not-found'||e.code==='auth/wrong-password'||e.code==='auth/invalid-credential') {
      showAuthErr('Invalid email or password.');
    } else {
      showAuthErr(e.message);
    }
  }
}

async function doRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-password').value;
  const role = document.getElementById('reg-role').value;
  if (!name||!email||!pass) { showAuthErr('Please fill all fields'); return; }
  if (pass.length < 6) { showAuthErr('Password must be at least 6 characters'); return; }
  try {
    const { createUserWithEmailAndPassword, doc, setDoc, serverTimestamp } = window._fb;
    const cred = await createUserWithEmailAndPassword(window._fb.auth, email, pass);
    await setDoc(doc(window._fb.db, 'users', cred.user.uid), {
      name, email, role, createdAt: serverTimestamp(), uid: cred.user.uid
    });
    toast('Account created! Signing in…','success');
  } catch(e) {
    if (e.code==='auth/email-already-in-use') {
      showAuthErr('This email is already registered. Please sign in.');
    } else if (e.code==='auth/weak-password') {
      showAuthErr('Password is too weak. Use at least 6 characters.');
    } else {
      showAuthErr(e.message);
    }
  }
}

function showAuthErr(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  setTimeout(() => el.textContent='', 5000);
}

async function doLogout() {
  const { signOut } = window._fb;
  await signOut(window._fb.auth);
}

// ═══════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════
const PAGE_TITLES = {
  dashboard:'Dashboard', units:'Structure & Units',
  members:'Member Management', idcards:'ID Cards',
  finance:'Finance Management', events:'Event Management',
  notifications:'Notifications', settings:'Settings'
};

function navigate(page) {
  state.currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page===page));
  document.getElementById('topbar-title').textContent = PAGE_TITLES[page]||page;
  // Unsubscribe previous listeners
  state.unsubscribers.forEach(u => { try { u(); } catch(e){} });
  state.unsubscribers = [];
  const pc = document.getElementById('page-content');
  pc.innerHTML = '<div class="empty-state"><div class="spinner" style="margin:0 auto 12px;width:32px;height:32px;border-color:var(--border);border-top-color:var(--navy)"></div></div>';
  closeSidebar();
  setTimeout(() => {
    switch(page) {
      case 'dashboard': renderDashboard(); break;
      case 'units': renderUnits(); break;
      case 'members': renderMembers(); break;
      case 'idcards': renderIdCards(); break;
      case 'finance': renderFinance(); break;
      case 'events': renderEvents(); break;
      case 'notifications': renderNotifications(); break;
      case 'settings': renderSettings(); break;
    }
  }, 50);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}

// ═══════════════════════════════════════
// APP INIT
// ═══════════════════════════════════════
function initApp() {
  const { onAuthStateChanged } = window._fb;
  onAuthStateChanged(window._fb.auth, async (user) => {
    if (user) {
      state.user = user;
      await loadUserProfile(user.uid);
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app').classList.add('visible');
      navigate('dashboard');
      startPendingBadge();
    } else {
      state.user = null;
      state.userProfile = null;
      document.getElementById('auth-screen').style.display = 'flex';
      document.getElementById('app').classList.remove('visible');
    }
  });
}

async function loadUserProfile(uid) {
  const { doc, getDoc } = window._fb;
  const snap = await getDoc(doc(window._fb.db, 'users', uid));
  if (snap.exists()) {
    state.userProfile = snap.data();
    document.getElementById('sidebar-username').textContent = state.userProfile.name || 'Admin';
    document.getElementById('sidebar-userrole').textContent = (state.userProfile.role||'').replace(/_/g,' ');
  }
}

async function startPendingBadge() {
  const { collection, query, where, onSnapshot } = window._fb;
  const q = query(collection(window._fb.db, 'members'), where('status','==','pending'));

async function loadUnitsView(view) {
  const { collection, getDocs } = window._fb;
  const snap = await getDocs(collection(window._fb.db, 'units'));
  const units = snap.docs.map(d=>({id:d.id,...d.data()}));
  state.cache.units = units;

  if (view==='tree') renderUnitTree(units);
  else renderUnitList(units);
}

function renderUnitTree(units) {
  const container = document.getElementById('units-view');
  const stateUnits = units.filter(u=>u.level==='state');
  const uniUnits = units.filter(u=>u.level==='university');
  const colUnits = units.filter(u=>u.level==='college');
  const facUnits = units.filter(u=>u.level==='faculty');

  function nodeHTML(u, level) {
    const icons = {state:'⊞',university:'◫',college:'◉',faculty:'▣'};
    const heads = {state:'Convenor',university:'President',college:'Principal',faculty:'HoD'};
    return `<div class="unit-node level-${level}" onclick="showUnitDetail('${u.id}')">
      <div class="unit-icon">${icons[level]||'◌'}</div>
      <div>
        <div class="unit-name">${u.name}</div>
        <div class="unit-meta">${u.location||''} ${u.headName?`· ${heads[level]}: ${u.headName}`:''}</div>
      </div>
      <span class="badge badge-navy" style="margin-left:auto">${level}</span>
    </div>`;
  }

  let html = '<div class="unit-tree">';
  // State level
  stateUnits.forEach(s => {
    html += nodeHTML(s, 'state');
    const unis = uniUnits.filter(u=>u.parentId===s.id);
    if (unis.length) {
      html += '<div class="unit-children">';
      unis.forEach(u => {
        html += nodeHTML(u, 'university');
        const cols = colUnits.filter(c=>c.parentId===u.id);
        if (cols.length) {
          html += '<div class="unit-children">';
          cols.forEach(c => {
            html += nodeHTML(c, 'college');
            const facs = facUnits.filter(f=>f.parentId===c.id);
            if (facs.length) {
              html += '<div class="unit-children">';
              facs.forEach(f => html += nodeHTML(f, 'faculty'));
              html += '</div>';
            }
          });
          html += '</div>';
        }
      });
      html += '</div>';
    }
  });

  // Unattached
  const attached = new Set([...uniUnits.filter(u=>u.parentId).map(u=>u.id), ...colUnits.filter(c=>c.parentId).map(c=>c.id)]);
  uniUnits.filter(u=>!u.parentId || !stateUnits.find(s=>s.id===u.parentId)).forEach(u => html += nodeHTML(u,'university'));
  colUnits.filter(c=>!uniUnits.find(u=>u.id===c.parentId)).forEach(c => html += nodeHTML(c,'college'));
  facUnits.filter(f=>!colUnits.find(c=>c.id===f.parentId)).forEach(f => html += nodeHTML(f,'faculty'));

  if (!units.length) html += `<div class="empty-state"><div class="empty-state-icon">◫</div><h4>No units yet</h4><p>Add state, university, college or faculty units</p></div>`;

  html += '</div>';
  container.innerHTML = html;
}

async function saveUnit() {
  const name = document.getElementById('unit-name').value.trim();
  const level = document.getElementById('unit-level').value;
  if (!name) { toast('Unit name is required','error'); return; }
  const { collection, addDoc, serverTimestamp } = window._fb;
  const data = {
    name, level,
    location: document.getElementById('unit-location').value.trim(),
    contact: document.getElementById('unit-contact').value.trim(),
    headName: document.getElementById('unit-head').value.trim(),
    headContact: document.getElementById('unit-head-contact').value.trim(),
    address: document.getElementById('unit-address').value.trim(),
    parentId: document.getElementById('unit-parent').value || null,
    createdAt: serverTimestamp(),
    createdBy: state.user?.uid
  };
  try {
    await addDoc(collection(window._fb.db, 'units'), data);
    toast('Unit added successfully','success');
    document.getElementById('modal-addunit').remove();
    renderUnits();
  } catch(e) { toast('Error: '+e.message,'error'); }
}

function renderMembersTable(members) {
  const tbody = document.getElementById('members-tbody');
  if (!tbody) return;
  const units = state.cache.units;
  if (!members.length) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="empty-state-icon">◉</div><h4>No members yet</h4></div></td></tr>`;
    return;
  }
  tbody.innerHTML = members.map(m => {
    const unit = units.find(u=>u.id===m.unitId);
    return `<tr>
      <td><input type="checkbox" class="member-check" value="${m.id}"></td>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="avatar">${initials(m.name)}</div>
          <div>
            <div style="font-weight:500;font-size:.87rem">${m.name}</div>
            <div style="font-size:.73rem;color:var(--text-soft)">${m.email||''}</div>
          </div>
        </div>
      </td>
      <td><code style="font-family:var(--font-mono);font-size:.75rem;color:var(--navy)">${m.memberId||'—'}</code></td>
      <td>${m.role||'Member'}</td>
      <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${unit?unit.name:'—'}</td>
      <td>${m.phone||'—'}</td>
      <td><span class="badge badge-${m.status==='approved'?'approved':m.status==='rejected'?'rejected':'pending'}">${m.status||'pending'}</span></td>
      <td>
        <div style="display:flex;gap:4px">
          <button class="btn btn-outline btn-xs" onclick="showMemberDetail('${m.id}')">View</button>
          ${m.status==='pending'?`<button class="btn btn-success btn-xs" onclick="approveMember('${m.id}')">Approve</button>`:''}
          <button class="btn btn-danger btn-xs" onclick="deleteMember('${m.id}')">✕</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function filterMembers() {
  const search = document.getElementById('member-search')?.value.toLowerCase()||'';
  const unit = document.getElementById('filter-unit')?.value||'';
  const status = document.getElementById('filter-status')?.value||'';
  const filtered = state.cache.members.filter(m => {
    const matchSearch = !search || m.name?.toLowerCase().includes(search) || m.phone?.includes(search) || m.memberId?.toLowerCase().includes(search);
    const matchUnit = !unit || m.unitId===unit;
    const matchStatus = !status || m.status===status;
    return matchSearch && matchUnit && matchStatus;
  });
  renderMembersTable(filtered);
}

function toggleSelectAll(cb) {
  document.querySelectorAll('.member-check').forEach(c => c.checked=cb.checked);
}

async function bulkApprove() {
  const selected = [...document.querySelectorAll('.member-check:checked')].map(c=>c.value);
  if (!selected.length) { toast('Select members to approve','error'); return; }
  const { doc, updateDoc } = window._fb;
  const promises = selected.map(id => updateDoc(doc(window._fb.db,'members',id), {status:'approved'}));
  await Promise.all(promises);
  toast(`${selected.length} member(s) approved`,'success');
}

async function approveMember(id) {
  const { doc, updateDoc } = window._fb;
  await updateDoc(doc(window._fb.db,'members',id), {status:'approved'});
  toast('Member approved','success');
}

async function deleteMember(id) {
  if (!confirm_dialog('Delete this member?')) return;
  const { doc, deleteDoc } = window._fb;
  await deleteDoc(doc(window._fb.db,'members',id));
  toast('Member deleted');
}

async function saveMember() {
  const name = document.getElementById('m-name').value.trim();
  const phone = document.getElementById('m-phone').value.trim();
  if (!name||!phone) { toast('Name and phone required','error'); return; }
  const { collection, addDoc, serverTimestamp } = window._fb;
  const memberId = genId('MBR');
  await addDoc(collection(window._fb.db,'members'), {
    name, phone, memberId,
    email: document.getElementById('m-email').value.trim(),
    role: document.getElementById('m-role').value,
    unitId: document.getElementById('m-unit').value || null,
    doj: document.getElementById('m-doj').value || null,
    validity: document.getElementById('m-validity').value || null,
    address: document.getElementById('m-address').value.trim(),
    status: document.getElementById('m-status').value,
    photo: document.getElementById('m-photo').value.trim() || null,
    createdAt: serverTimestamp(),
    createdBy: state.user?.uid
  });
  toast('Member added successfully','success');
  document.getElementById('modal-addmember').remove();
}

async function renderIdCards() {
  const pc = document.getElementById('page-content');
  pc.innerHTML = `
    <div class="page-header">
      <div class="page-header-left">
        <h2>ID Card Generator</h2>
        <p>Generate and print professional identity cards</p>
      </div>
    </div>
    <div class="filter-bar">
      <div class="search-bar"><input type="text" id="id-search" placeholder="Search member…" oninput="filterIdCards()"><button>⌕</button></div>
      <select class="form-control" style="width:auto" id="id-unit-filter" onchange="filterIdCards()">
        <option value="">All Units</option>
        ${(state.cache.units||[]).map(u=>`<option value="${u.id}">${u.name}</option>`).join('')}
      </select>
    </div>
    <div id="id-cards-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px;margin-top:8px"></div>`;

  const { collection, getDocs, query, where } = window._fb;
  const snap = await getDocs(query(collection(window._fb.db,'members'), where('status','==','approved')));

function renderIdCardsGrid(members) {
  const grid = document.getElementById('id-cards-grid');
  if (!grid) return;
  if (!members.length) { grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">▣</div><h4>No approved members</h4></div>'; return; }
  grid.innerHTML = members.map(m => {
    const unit = state.cache.units.find(u=>u.id===m.unitId);
    return `
    <div>
      <div class="id-card" id="card-${m.id}">
        <div class="id-card-header">
          <div class="org-name">STATE ORGANISATION</div>
          <div class="id-title">Official Identity Card</div>
        </div>
        <div class="id-card-body">
          ${m.photo?`<img src="${m.photo}" style="width:72px;height:72px;border-radius:50%;object-fit:cover;border:3px solid var(--gold);display:block;margin:0 auto 12px">`
            :`<div class="id-photo">${initials(m.name)}</div>`}
          <div class="id-member-name">${m.name}</div>
          <div class="id-member-role">${m.role||'Member'}</div>
          <div class="id-details">
            <div class="id-field"><label>Member ID</label><span>${m.memberId||'—'}</span></div>
            <div class="id-field"><label>Phone</label><span>${m.phone||'—'}</span></div>
            <div class="id-field"><label>Unit</label><span>${unit?unit.name.slice(0,20):'—'}</span></div>
            <div class="id-field"><label>Valid Until</label><span>${m.validity||'Lifetime'}</span></div>
          </div>
        </div>
        <div class="id-card-footer">
          <div>
            <div class="id-number">${m.memberId||'—'}</div>
            <div style="font-size:.62rem;color:var(--text-soft);margin-top:2px">ISSUED: ${m.doj||new Date().toLocaleDateString('en-IN')}</div>
          </div>
          <div id="qr-${m.id}" class="id-qr"></div>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn btn-outline btn-sm" onclick="printIdCard('${m.id}')">🖨 Print</button>
        <button class="btn btn-outline btn-sm" onclick="downloadIdCard('${m.id}')">↓ Save</button>
      </div>
    </div>`;
  }).join('');

  // Generate QR codes
  members.forEach(m => {
    const el = document.getElementById(`qr-${m.id}`);
    if (el && typeof QRCode !== 'undefined') {
      el.innerHTML = '';
      new QRCode(el, { text: `ORGNET:${m.memberId}:${m.name}:${m.role||''}`, width:52, height:52, colorDark:'#1a2744', colorLight:'#faf8f3' });
    }
  });
}

function filterIdCards() {
  const search = document.getElementById('id-search')?.value.toLowerCase()||'';
  const unit = document.getElementById('id-unit-filter')?.value||'';
  const filtered = state.cache.members.filter(m => {
    const matchSearch = !search || m.name?.toLowerCase().includes(search) || m.memberId?.toLowerCase().includes(search);
    const matchUnit = !unit || m.unitId===unit;
    return matchSearch && matchUnit;
  });
  renderIdCardsGrid(filtered);
}

function printIdCard(id) {
  const card = document.getElementById(`card-${id}`);
  if (!card) return;
  const w = window.open('','_blank','width=400,height=600');
  w.document.write(`<!DOCTYPE html><html><head><title>ID Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500&family=DM+Mono&display=swap" rel="stylesheet">
    <style>body{margin:20px;font-family:'DM Sans',sans-serif;background:#fff} ${document.querySelector('style').textContent}</style></head>
    <body>${card.outerHTML}<script>window.onload=()=>{window.print();window.close()}<\/script></body></html>`);
  w.document.close();
}

async function loadFinView(view) {
  const { collection, getDocs, query, orderBy } = window._fb;
  const [txSnap, objSnap] = await Promise.all([
    getDocs(query(collection(window._fb.db,'transactions'), orderBy('createdAt','desc'))),
    getDocs(collection(window._fb.db,'objectives'))
  ]);
  const txs = txSnap.docs.map(d=>({id:d.id,...d.data()}));
  const objectives = objSnap.docs.map(d=>({id:d.id,...d.data()}));
  state.cache.transactions = txs;
  state.cache.objectives = objectives;

  const genTxs = txs.filter(t=>!t.objectiveId);
  const genIncome = genTxs.filter(t=>t.type==='income').reduce((s,t)=>s+(t.amount||0),0);
  const genExpense = genTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+(t.amount||0),0);
  const genBalance = genIncome - genExpense;

  const container = document.getElementById('fin-view');
  if (!container) return;

  if (view==='overview') {
    container.innerHTML = `
      <div class="stats-grid" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr))">
        <div class="stat-card navy"><div class="stat-card-icon">↑</div><div class="stat-value">₹${fmt(genIncome)}</div><div class="stat-label">Total Income</div></div>
        <div class="stat-card warn"><div class="stat-card-icon">↓</div><div class="stat-value">₹${fmt(genExpense)}</div><div class="stat-label">Total Expense</div></div>
        <div class="stat-card green"><div class="stat-card-icon">◈</div><div class="stat-value">₹${fmt(genBalance)}</div><div class="stat-label">General Balance</div></div>
        <div class="stat-card gold"><div class="stat-card-icon">◎</div><div class="stat-value">${objectives.length}</div><div class="stat-label">Obj. Funds</div></div>
      </div>
      <div class="dashboard-grid">
        <div class="col-6">
          <div class="fund-card">
            <div class="fund-card-header general">
              <div>
                <div style="font-size:.72rem;opacity:.7;letter-spacing:.1em;text-transform:uppercase">General Fund</div>
                <div class="fund-balance" style="margin-top:4px"><small>₹</small>${fmt(genBalance)}</div>
              </div>
              <button class="btn btn-outline btn-sm" style="background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:white" onclick="showAddTransaction('general')">+ Add</button>
            </div>
            <div>
              ${genTxs.slice(0,8).map(t=>`<div class="ledger-row">
                <div class="ledger-type ${t.type==='income'?'credit':'debit'}"></div>
                <div style="flex:1">
                  <div style="font-size:.84rem">${t.description||t.type}</div>
                  <div style="font-size:.73rem;color:var(--text-soft)">${fmtDate(t.createdAt)}</div>
                </div>
                <div class="ledger-amount ${t.type==='income'?'credit':'debit'}">
                  ${t.type==='income'?'+':'-'}₹${fmt(t.amount)}
                </div>
              </div>`).join('')}
              ${!genTxs.length?'<div class="empty-state" style="padding:20px"><p>No transactions</p></div>':''}
            </div>
          </div>
        </div>
        <div class="col-6">
          <div style="display:flex;flex-direction:column;gap:12px">
            ${objectives.map(obj=>{
              const objTxs = txs.filter(t=>t.objectiveId===obj.id);
              const don = objTxs.filter(t=>t.type==='income').reduce((s,t)=>s+(t.amount||0),0);
              const exp = objTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+(t.amount||0),0);
              const bal = don-exp;
              return `<div class="fund-card">
                <div class="fund-card-header objective">
                  <div>
                    <div style="font-size:.72rem;opacity:.7;letter-spacing:.1em;text-transform:uppercase">${obj.name}</div>
                    <div class="fund-balance" style="margin-top:4px"><small>₹</small>${fmt(bal)}</div>
                  </div>
                  <div style="text-align:right;font-size:.75rem;opacity:.8">
                    <div>Donated: ₹${fmt(don)}</div>
                    <div>Spent: ₹${fmt(exp)}</div>
                  </div>
                </div>
              </div>`;
            }).join('')}
            <button class="btn btn-outline w-full" onclick="showAddObjective()">+ New Objective Fund</button>
          </div>
        </div>
      </div>`;
  }
  else if (view==='general') {
    container.innerHTML = `<div class="card">
      <div class="card-header"><h3>General Ledger</h3><button class="btn btn-outline btn-sm" onclick="window.print()">🖨 Print</button></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Date</th><th>Description</th><th>Category</th><th>Type</th><th>Debit</th><th>Credit</th><th>Balance</th></tr></thead>
          <tbody>
            ${(() => {
              let running = 0;
              return genTxs.slice().reverse().map(t => {
                if (t.type==='income') running += t.amount||0;
                else running -= t.amount||0;
                return `<tr>
                  <td>${fmtDate(t.createdAt)}</td>
                  <td>${t.description||'—'}</td>
                  <td>${t.category||'—'}</td>
                  <td><span class="badge badge-${t.type==='income'?'approved':'rejected'}">${t.type}</span></td>
                  <td style="color:var(--danger)">${t.type==='expense'?'₹'+fmt(t.amount):''}</td>
                  <td style="color:var(--success)">${t.type==='income'?'₹'+fmt(t.amount):''}</td>
                  <td style="font-weight:600;color:${running>=0?'var(--success)':'var(--danger)'}">₹${fmt(running)}</td>
                </tr>`;
              }).reverse().join('');
            })()}
            ${!genTxs.length?'<tr><td colspan="7"><div class="empty-state"><p>No transactions</p></div></td></tr>':''}

        </table>

      const exp = objTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+(t.amount||0),0);
      const bal = don-exp;
      return `<div class="card" style="margin-bottom:16px">
        <div class="card-header">
          <h3>${obj.name}</h3>
          <div style="display:flex;gap:8px">
            <span class="badge badge-approved">Balance: ₹${fmt(bal)}</span>
            <button class="btn btn-outline btn-xs" onclick="showAddTransaction('${obj.id}')">+ Transaction</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Date</th><th>Description</th><th>Type</th><th>Amount</th></tr></thead>
            <tbody>
              ${objTxs.map(t=>`<tr>
                <td>${fmtDate(t.createdAt)}</td>
                <td>${t.description||'—'}</td>
                <td><span class="badge badge-${t.type==='income'?'approved':'rejected'}">${t.type}</span></td>
                <td style="font-family:var(--font-mono);font-weight:500;color:${t.type==='income'?'var(--success)':'var(--danger)'}">
                  ${t.type==='income'?'+':'-'}₹${fmt(t.amount)}
                </td>
              </tr>`).join('')}
              ${!objTxs.length?'<tr><td colspan="4"><div class="empty-state" style="padding:16px"><p>No transactions for this objective</p></div></td></tr>':''}
            </tbody>
          </table>
        </div>

    date: document.getElementById('tx-date').value,
    reference: document.getElementById('tx-ref').value.trim() || null,

async function doTransfer() {
  const from = document.getElementById('tx-from').value;
  const to = document.getElementById('tx-to').value;
  const amount = parseFloat(document.getElementById('tx-amt').value);
  const note = document.getElementById('tx-note').value.trim();
  if (from===to) { toast('Source and destination must differ','error'); return; }
  if (!amount||amount<=0) { toast('Enter a valid amount','error'); return; }
  const { collection, addDoc, serverTimestamp } = window._fb;
  const batch = [
    addDoc(collection(window._fb.db,'transactions'), {
      type:'expense', amount, description:`Transfer to ${to==='general'?'General Fund':state.cache.objectives.find(o=>o.id===to)?.name||to}. ${note}`,
      objectiveId: from==='general'?null:from, category:'Transfer', createdAt: serverTimestamp(), createdBy: state.user?.uid
    }),
    addDoc(collection(window._fb.db,'transactions'), {
      type:'income', amount, description:`Transfer from ${from==='general'?'General Fund':state.cache.objectives.find(o=>o.id===from)?.name||from}. ${note}`,
      objectiveId: to==='general'?null:to, category:'Transfer', createdAt: serverTimestamp(), createdBy: state.user?.uid
    })
  ];
  await Promise.all(batch);
  toast(`₹${fmt(amount)} transferred successfully`,'success');
  renderFinance();
}

async function saveAttendance(eventId) {
  const checked = [...document.querySelectorAll('[id^="att-"]:checked')].map(c=>c.value);
  const { collection, doc, setDoc, serverTimestamp, writeBatch, getDocs, query, where, deleteDoc } = window._fb;
  // Delete existing
  const existing = await getDocs(query(collection(window._fb.db,'attendance'), where('eventId','==',eventId)));
  const batch = writeBatch(window._fb.db);
  existing.docs.forEach(d => batch.delete(d.ref));
  checked.forEach(memberId => {
    const ref = doc(collection(window._fb.db,'attendance'));
    batch.set(ref, {eventId, memberId, markedAt: serverTimestamp()});
  });
  await batch.commit();
  toast(`Attendance saved — ${checked.length} present`,'success');
  document.getElementById('modal-attendance').remove();
}

              </div>
            </div>
            <button class="btn btn-primary w-full" style="margin-top:12px" onclick="sendQuickNotif()">Send Broadcast</button>
            <hr class="divider">
            <button class="btn btn-outline w-full" onclick="shareWhatsApp()">📱 Share via WhatsApp</button>
          </div>
        </div>
      </div>
    </div>`;

  const { collection, getDocs, query, orderBy } = window._fb;
  const snap = await getDocs(query(collection(window._fb.db,'notifications'), orderBy('createdAt','desc')));
  state.cache.notifications = snap.docs.map(d=>({id:d.id,...d.data()}));

  const list = document.getElementById('notif-list');
  if (!state.cache.notifications.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">◌</div><h4>No notifications yet</h4></div>';
  } else {
    list.innerHTML = state.cache.notifications.map(n=>`<div class="notif-card">
      <div class="notif-dot-type broadcast"></div>
      <div class="notif-content">
        <h4>${n.title}</h4>
        <p>${n.message}</p>
        <div style="display:flex;gap:8px;margin-top:6px">
          <span class="badge badge-navy">${n.level||'state'}</span>
          <button class="btn btn-outline btn-xs" onclick="shareNotifWA('${n.id}')">📱 WhatsApp</button>
        </div>
      </div>
      <div class="notif-meta">${fmtDate(n.createdAt)}</div>
    </div>`).join('');
  }
}

async function sendQuickNotif() {
  const title = document.getElementById('qn-title').value.trim();
  const msg = document.getElementById('qn-msg').value.trim();
  const level = document.getElementById('qn-level').value;
  if (!title||!msg) { toast('Title and message required','error'); return; }
  const { collection, addDoc, serverTimestamp } = window._fb;
  await addDoc(collection(window._fb.db,'notifications'), {
    title, message: msg, level, createdAt: serverTimestamp(), createdBy: state.user?.uid
  });
  toast('Broadcast sent','success');
  document.getElementById('qn-title').value='';
  document.getElementById('qn-msg').value='';
  renderNotifications();
}

function shareWhatsApp() {
  const title = document.getElementById('qn-title')?.value||'';
  const msg = document.getElementById('qn-msg')?.value||'';
  const text = `*OrgNet Broadcast*\n\n*${title}*\n\n${msg}\n\n_Sent via OrgNet State Management_`;
  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
}

function shareNotifWA(id) {
  const n = state.cache.notifications.find(x=>x.id===id);
  if (!n) return;
  const text = `*OrgNet Broadcast*\n\n*${n.title}*\n\n${n.message}\n\n_${fmtDate(n.createdAt)}_`;
  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
}

function showSendNotif() {
  document.getElementById('app').insertAdjacentHTML('beforeend',`
    <div class="modal-overlay show" id="modal-notif">
      <div class="modal">
        <div class="modal-header">
          <h3>Send Broadcast</h3>
          <button class="modal-close" onclick="document.getElementById('modal-notif').remove()">✕</button>
        </div>
        <div class="modal-body">
          <div class="form-grid">
            <div class="form-group"><label>Broadcast Level</label>
              <select class="form-control" id="bn-level">
                <option value="state">State Level (All)</option>
                <option value="university">University Level</option>
                <option value="unit">Unit Level</option>
              </select>
            </div>
            <div class="form-group"><label>Title *</label><input type="text" class="form-control" id="bn-title" placeholder="Notification title"></div>
            <div class="form-group"><label>Message *</label><textarea class="form-control" id="bn-msg" rows="5" placeholder="Your broadcast message…"></textarea></div>
            <div class="form-group"><label>Priority</label>
              <select class="form-control" id="bn-priority">
                <option value="normal">Normal</option>
                <option value="important">Important</option>
                <option value="urgent">Urgent</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline" onclick="document.getElementById('modal-notif').remove()">Cancel</button>
          <button class="btn btn-primary" onclick="saveBroadcast()">Send</button>
        </div>
      </div>
    </div>`);
}

async function saveBroadcast() {
  const title = document.getElementById('bn-title').value.trim();
  const msg = document.getElementById('bn-msg').value.trim();
  if (!title||!msg) { toast('Fill all required fields','error'); return; }
  const { collection, addDoc, serverTimestamp } = window._fb;
  await addDoc(collection(window._fb.db,'notifications'), {
    title, message: msg,
    level: document.getElementById('bn-level').value,
    priority: document.getElementById('bn-priority').value,
    createdAt: serverTimestamp(), createdBy: state.user?.uid
  });
  toast('Broadcast sent successfully','success');
  document.getElementById('modal-notif').remove();
  renderNotifications();
}

// ═══════════════════════════════════════

  const pc = document.getElementById('page-content');
  const profile = state.userProfile||{};
  pc.innerHTML = `
    <div class="page-header">
      <div class="page-header-left">
        <h2>Settings</h2>

      </div>
    </div>

          </div>
        </div>
      </div>
      <div class="col-6">
        <div class="card">
          <div class="card-header"><h3>My Profile</h3></div>
          <div class="card-body">
            <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">
              <div class="avatar avatar-lg">${initials(profile.name||'?')}</div>
              <div>
                <div class="font-serif" style="font-size:1.1rem;color:var(--navy)">${profile.name||'—'}</div>
                <div style="color:var(--text-soft);font-size:.83rem">${profile.email||state.user?.email||'—'}</div>

      <div class="col-12">

function saveOrgSettings() {
  localStorage.setItem('orgName', document.getElementById('s-orgname').value);
  localStorage.setItem('orgState', document.getElementById('s-state').value);
  localStorage.setItem('orgRegNo', document.getElementById('s-regno').value);
  localStorage.setItem('orgYear', document.getElementById('s-year').value);
  toast('Organisation settings saved','success');
}

async function saveProfile() {
  const name = document.getElementById('s-name').value.trim();
  const phone = document.getElementById('s-phone').value.trim();
  if (!name) { toast('Name required','error'); return; }
  const { doc, updateDoc } = window._fb;
  await updateDoc(doc(window._fb.db,'users', state.user.uid), {name, phone});
  state.userProfile = {...(state.userProfile||{}), name, phone};
  document.getElementById('sidebar-username').textContent = name;
  toast('Profile updated','success');
}

// ═══════════════════════════════════════
// STARTUP
// ═══════════════════════════════════════
function startApp() {
  if (window._fbReady) initApp();
  else document.addEventListener('fbReady', initApp, {once:true});
  // Offline cache
  window.addEventListener('online', () => toast('Connection restored','success'));
  window.addEventListener('offline', () => toast('Working offline — changes will sync when connected','error'));
}

startApp();
</script>
</body>
</html>
